<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — Ilm AI</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="auth-page">
    <div style="position:absolute;top:20px;right:20px;z-index:2" class="lang-switch">
      <button type="button" class="lang-btn" data-lang="en">EN</button>
      <button type="button" class="lang-btn active" data-lang="uz">UZ</button>
      <button type="button" class="lang-btn" data-lang="ru">RU</button>
    </div>

    <div class="auth-card">
      <a href="index.html" class="logo">
        <span class="logo-mark">📚</span>
        <span data-i18n="brand">Ilm AI</span>
      </a>
      <h2 style="text-align:center;font-size:1.5rem;margin-bottom:4px" data-i18n="signup_title">Create your account</h2>
      <p class="auth-sub" data-i18n="signup_sub">Start your personal learning journey</p>

      <div class="alert alert-error" id="errorMsg"></div>
      <div class="alert alert-success" id="successMsg"></div>

      <div class="form-group">
        <label data-i18n="name">Full name</label>
        <input type="text" id="name" autocomplete="name" />
      </div>
      <div class="form-group">
        <label data-i18n="email">Email</label>
        <input type="email" id="email" placeholder="learner@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label data-i18n="password">Password</label>
        <input type="password" id="password" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label data-i18n="confirm_password">Confirm password</label>
        <input type="password" id="confirmPassword" autocomplete="new-password" />
      </div>

      <button type="button" class="btn btn-primary btn-block" id="signupBtn" data-i18n="signup_btn">Create account</button>

      <p class="auth-footer">
        <span data-i18n="have_account">Already have an account?</span>
        <a href="login.html" data-i18n="login_link">Log in</a>
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    localStorage.removeItem('ilm_current_user');
    localStorage.removeItem('ilm_users');
    if (getSession()) location.href = 'dashboard.html';

    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const signupBtn = document.getElementById('signupBtn');

    function showError(msg) {
      successMsg.style.display = 'none';
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    async function signup() {
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!name || !email || !password || !confirmPassword) {
        showError(t('err_fill'));
        return;
      }
      if (password.length < 6) {
        showError(t('err_password_len'));
        return;
      }
      if (password !== confirmPassword) {
        showError(t('err_password_match'));
        return;
      }

      signupBtn.disabled = true;
      signupBtn.textContent = '...';

      try {
        const data = await apiPost('/auth/signup', { name, email, password });
        setSession(data);
        successMsg.textContent = t('success_signup');
        successMsg.style.display = 'block';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      } catch (e) {
        showError(e.message === 'Failed to fetch' ? t('err_network') : e.message);
        signupBtn.disabled = false;
        signupBtn.textContent = t('signup_btn');
      }
    }

    signupBtn.addEventListener('click', signup);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') signup();
    });
  </script>
</body>
</html>
