<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ilm AI — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar {
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #e879f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .navbar .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }
    .btn-logout {
      padding: 8px 16px;
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.3); }

    /* LAYOUT */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #a5b4fc;
    }

    /* UPLOAD */
    .upload-area {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .upload-area:hover { border-color: #6366f1; }
    .upload-area p { color: rgba(255,255,255,0.5); font-size: 14px; }
    .upload-area input { display: none; }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-msg {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status-success {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }
    .status-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    /* FILES LIST */
    .files-list {
      list-style: none;
      margin-top: 8px;
    }
    .files-list li {
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .files-list li::before { content: "📄"; }

    /* CHAT */
    .chat-card {
      grid-column: 1 / -1;
    }

    .chat-messages {
      height: 320px;
      overflow-y: auto;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 4px;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }
    .msg-user {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      align-self: flex-end;
    }
    .msg-ai {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      align-self: flex-start;
      color: rgba(255,255,255,0.9);
    }
    .msg-system {
      align-self: center;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      padding: 6px 12px;
    }

    .chat-input-row {
      display: flex;
      gap: 10px;
    }
    .chat-input-row input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .chat-input-row input:focus { border-color: #6366f1; }
    .chat-input-row input::placeholder { color: rgba(255,255,255,0.3); }
    .btn-send {
      padding: 12px 20px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .empty-state {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 14px;
      margin: auto;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">📚 Ilm AI</div>
    <div class="user-info">
      <span id="userName">Loading...</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">

    <!-- UPLOAD CARD -->
    <div class="card">
      <h2>📤 Upload Materials</h2>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>Click to upload PDF or TXT file</p>
        <p id="selectedFile" style="margin-top:8px; color:#a5b4fc;"></p>
        <input type="file" id="fileInput" accept=".pdf,.txt" onchange="onFileSelect(event)" />
      </div>
      <button class="btn" onclick="uploadFile()" id="uploadBtn">Upload & Index</button>
      <div class="status-msg" id="uploadStatus"></div>
    </div>

    <!-- FILES CARD -->
    <div class="card">
      <h2>📁 My Materials</h2>
      <ul class="files-list" id="filesList">
        <li style="color:rgba(255,255,255,0.3); list-style:none;">No files uploaded yet</li>
      </ul>
      <button class="btn" style="margin-top:12px; background: rgba(255,255,255,0.1);" onclick="loadFiles()">Refresh</button>
    </div>

    <!-- PLAN CARD -->
    <div class="card">
      <h2>🧭 Generate Study Plan</h2>
      <div class="form-group">
        <label>Goal</label>
        <input type="text" id="planGoal" placeholder="What do you want to learn?" />
      </div>
      <div class="form-group">
        <label>Target Date</label>
        <input type="date" id="planTargetDate" />
      </div>
      <div class="form-group">
        <label>Daily Study Hours</label>
        <input type="number" id="planDailyHours" min="0.5" step="0.5" value="1" />
      </div>
      <button class="btn" onclick="generatePlan()" id="planBtn">Generate Plan</button>
      <div class="status-msg" id="planStatus"></div>
      <div id="planResult" style="margin-top:16px; display:none;"></div>
    </div>

    <!-- QUIZ CARD -->
    <div class="card">
      <h2>📝 Generate Quiz</h2>
      <div class="form-group">
        <label>Difficulty</label>
        <select id="quizDifficulty" style="width:100%; padding:12px 16px; background: rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#fff;">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div class="form-group">
        <label>Number of Questions</label>
        <input type="number" id="quizCount" min="1" max="10" value="5" />
      </div>
      <button class="btn" onclick="generateQuiz()" id="quizBtn">Generate Quiz</button>
      <div class="status-msg" id="quizStatus"></div>
      <div id="quizResult" style="margin-top:16px; display:none;"></div>
    </div>

    <!-- CHAT CARD -->
    <div class="card chat-card">
      <h2>💬 Ask Your Materials</h2>
      <div class="chat-messages" id="chatMessages">
        <div class="msg msg-system">Upload a file and start asking questions!</div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Ask anything from your materials..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button class="btn-send" onclick="sendMessage()" id="sendBtn">Ask</button>
      </div>
    </div>

  </div>

  <script>
    const API = "http://localhost:8000";
    let currentUser = null;
    let selectedFile = null;

  
    window.onload = function() {
      const user = localStorage.getItem("ilm_current_user");
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      currentUser = JSON.parse(user);
      document.getElementById("userName").textContent = "👋 " + currentUser.name;
      loadFiles();
    };

    function logout() {
      localStorage.removeItem("ilm_current_user");
      window.location.href = "login.html";
    }

    function onFileSelect(event) {
      selectedFile = event.target.files[0];
      if (selectedFile) {
        document.getElementById("selectedFile").textContent = "Selected: " + selectedFile.name;
      }
    }

    async function uploadFile() {
      if (!selectedFile) {
        showStatus("uploadStatus", "Please select a file first!", "error");
        return;
      }

      const btn = document.getElementById("uploadBtn");
      btn.disabled = true;
      btn.textContent = "Uploading...";

      const formData = new FormData();
      formData.append("file", selectedFile);

      try {
        const res = await fetch(`${API}/files/upload?user_id=${currentUser.id}`, {
          method: "POST",
          body: formData
        });
        const data = await res.json();
        showStatus("uploadStatus", `✅ ${data.filename} uploaded! ${data.chunks} chunks indexed.`, "success");
        loadFiles();
        selectedFile = null;
        document.getElementById("selectedFile").textContent = "";
      } catch (err) {
        showStatus("uploadStatus", "❌ Upload failed. Check if backend is running.", "error");
      }

      btn.disabled = false;
      btn.textContent = "Upload & Index";
    }

    async function loadFiles() {
      try {
        const res = await fetch(`${API}/files/list?user_id=${currentUser.id}`);
        const data = await res.json();
        const list = document.getElementById("filesList");

        if (data.files && data.files.length > 0) {
          list.innerHTML = data.files.map(f => `<li>${f}</li>`).join("");
        } else {
          list.innerHTML = '<li style="color:rgba(255,255,255,0.3);">No files uploaded yet</li>';
        }
      } catch (err) {
        console.log("Could not load files");
      }
    }

    async function sendMessage() {
      const input = document.getElementById("chatInput");
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";

      const sendBtn = document.getElementById("sendBtn");
      sendBtn.disabled = true;
      sendBtn.textContent = "...";

      addMessage("Thinking...", "ai", "thinkingMsg");

      try {
        const res = await fetch(`${API}/chat/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_id: currentUser.id, question })
        });
        const data = await res.json();

        const thinking = document.getElementById("thinkingMsg");
        if (thinking) thinking.remove();

        addMessage(data.answer, "ai");
      } catch (err) {
        const thinking = document.getElementById("thinkingMsg");
        if (thinking) thinking.remove();
        addMessage("❌ Could not connect to backend.", "ai");
      }

      sendBtn.disabled = false;
      sendBtn.textContent = "Ask";
    }

    function addMessage(text, type, id) {
      const messages = document.getElementById("chatMessages");
      const div = document.createElement("div");
      div.className = `msg msg-${type}`;
      div.textContent = text;
      if (id) div.id = id;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      // Remove empty state
      const empty = messages.querySelector(".msg-system");
      if (empty && type === "user") empty.remove();
    }

    async function generatePlan() {
      const goal = document.getElementById('planGoal').value.trim();
      const targetDate = document.getElementById('planTargetDate').value;
      const dailyHours = parseFloat(document.getElementById('planDailyHours').value);
      const statusId = 'planStatus';
      const resultContainer = document.getElementById('planResult');

      if (!goal || !targetDate || !dailyHours) {
        showStatus(statusId, 'Please fill out all plan fields.', 'error');
        return;
      }

      const btn = document.getElementById('planBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      try {
        const res = await fetch(`${API}/plan/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: currentUser.id, goal, target_date: targetDate, daily_hours: dailyHours })
        });
        const data = await res.json();

        if (data.error) {
          showStatus(statusId, `⚠ ${data.error}`, 'error');
          resultContainer.style.display = 'none';
        } else {
          showStatus(statusId, '✅ Plan generated successfully.', 'success');
          displayPlan(data);
        }
      } catch (err) {
        showStatus(statusId, '❌ Could not generate plan. Check backend.', 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Generate Plan';
    }

    function displayPlan(plan) {
      const resultContainer = document.getElementById('planResult');
      resultContainer.style.display = 'block';
      resultContainer.innerHTML = `
        <div style="background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:16px;">
          <strong>Summary:</strong>
          <p style="margin:8px 0; color: rgba(255,255,255,0.8);">${plan.summary || 'No summary provided.'}</p>
          <strong>Target date:</strong> <span style="color:#a5b4fc;">${plan.target_date}</span>
          <div style="margin-top:12px;">
            <strong>Weekly breakdown:</strong>
            ${plan.weekly_breakdown ? plan.weekly_breakdown.map(week => `
              <div style="margin-top:10px; padding:10px; border:1px solid rgba(255,255,255,0.1); border-radius:10px;">
                <div style="font-weight:600;">Week ${week.week}: ${week.focus}</div>
                ${week.days ? week.days.map(day => `
                  <div style="margin-top:8px;">
                    <div style="font-size:13px; font-weight:600;">Day ${day.day} — ${day.date}</div>
                    <div style="font-size:13px; color: rgba(255,255,255,0.75);">${day.topic} • ${day.material}</div>
                    <div style="font-size:13px; color: rgba(255,255,255,0.7);">Tasks: ${day.tasks ? day.tasks.join(', ') : 'N/A'}</div>
                  </div>
                `).join('') : ''}
              </div>
            `).join('') : '<p style="color: rgba(255,255,255,0.7);">No weekly plan returned.</p>'}
          </div>
        </div>
      `;
    }

    async function generateQuiz() {
      const difficulty = document.getElementById('quizDifficulty').value;
      const numQuestions = parseInt(document.getElementById('quizCount').value, 10);
      const statusId = 'quizStatus';
      const resultContainer = document.getElementById('quizResult');

      if (!difficulty || !numQuestions || numQuestions < 1) {
        showStatus(statusId, 'Please select difficulty and number of questions.', 'error');
        return;
      }

      const btn = document.getElementById('quizBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      try {
        const res = await fetch(`${API}/quiz/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: currentUser.id, difficulty, num_questions: numQuestions })
        });
        const data = await res.json();

        if (data.error) {
          showStatus(statusId, `⚠ ${data.error}`, 'error');
          resultContainer.style.display = 'none';
        } else {
          showStatus(statusId, '✅ Quiz generated successfully.', 'success');
          displayQuiz(data);
        }
      } catch (err) {
        showStatus(statusId, '❌ Could not generate quiz. Check backend.', 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Generate Quiz';
    }

    function displayQuiz(quizData) {
      const resultContainer = document.getElementById('quizResult');
      resultContainer.style.display = 'block';
      if (!quizData.questions || !quizData.questions.length) {
        resultContainer.innerHTML = '<p style="color: rgba(255,255,255,0.7);">No quiz questions were generated.</p>';
        return;
      }

      resultContainer.innerHTML = quizData.questions.map((q, index) => `
        <div style="margin-bottom:16px; padding:16px; border:1px solid rgba(255,255,255,0.1); border-radius:12px;">
          <div style="font-weight:600; margin-bottom:8px;">Q${index + 1}: ${q.question}</div>
          <div style="color: rgba(255,255,255,0.8); margin-bottom:8px;">Type: ${q.type || 'n/a'}</div>
          <ul style="list-style:none; padding-left:0; color: rgba(255,255,255,0.85);">
            ${q.options ? q.options.map(option => `<li style="margin-bottom:4px;">• ${option}</li>`).join('') : ''}
          </ul>
          <div style="margin-top:8px; color: rgba(255,255,255,0.7);">Correct answer: ${q.correct_answer || 'n/a'}</div>
          <div style="margin-top:8px; color: rgba(255,255,255,0.7);">Explanation: ${q.explanation || 'No explanation provided.'}</div>
        </div>
      `).join('');
    }

    function showStatus(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = `status-msg status-${type}`;
      el.style.display = "block";
      setTimeout(() => { el.style.display = "none"; }, 4000);
    }
  </script>
</body>
</html>
