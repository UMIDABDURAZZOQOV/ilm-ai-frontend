<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ilm AI — Sign Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .bg-glow {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      top: -100px; right: -100px;
      pointer-events: none;
    }
    .bg-glow2 {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 70%);
      bottom: -50px; left: -50px;
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
    }
    .logo h1 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #e879f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.3); }
    input:focus { border-color: #6366f1; }

    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #86efac;
      margin-bottom: 16px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }

    .divider {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .link-row {
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-top: 24px;
    }
    .link-row a {
      color: #a5b4fc;
      text-decoration: none;
      font-weight: 500;
    }
    .link-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <h1>Ilm AI</h1>
      <p>Create an account</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">You have successfully signed up! Redirecting...</div>

    <div class="form-group">
      <label>Name</label>
      <input type="text" id="name" placeholder="Your name" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@email.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter your password" />
    </div>

    <button class="btn" onclick="signup()">Sign Up</button>

    <div class="divider">or</div>

    <div class="link-row">
      Already have an account? <a href="login.html">Log In</a>
    </div>
  </div>

  <script>
    function signup() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!name || !email || !password || !confirmPassword) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters long.';
        errorMsg.style.display = 'block';
        return;
      }
      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      const users = JSON.parse(localStorage.getItem('ilm_users') || '[]');
      const exists = users.find(u => u.email === email);
      if (exists) {
        errorMsg.textContent = 'An account with this email already exists.';
        errorMsg.style.display = 'block';
        return;
      }

      const newUser = { id: Date.now(), name, email, password, createdAt: new Date().toISOString() };
      users.push(newUser);
      localStorage.setItem('ilm_users', JSON.stringify(users));
      localStorage.setItem('ilm_current_user', JSON.stringify(newUser));

      successMsg.style.display = 'block';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') signup();
    });

    if (localStorage.getItem('ilm_current_user')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
